apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
  namespace: ticketing-app
  labels:
    app: pricing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing-service
  template:
    metadata:
      labels:
        app: pricing-service
    spec:
      containers:
      - name: pricing-service
        image: ticketing-app/pricing-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
          name: http
        env:
        - name: PRICING_SERVICE_PORT
          value: "8086"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /pricing/health
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /pricing/health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
  namespace: ticketing-app
  labels:
    app: pricing-service
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
    protocol: TCP
    name: http
  selector:
    app: pricing-service
