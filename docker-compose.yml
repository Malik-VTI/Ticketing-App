version: '3.8'

services:
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketing-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - ticketing-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateaway
      dockerfile: Dockerfile
    container_name: ticketing-api-gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - AUTH_SERVICE_URL=http://authentication-service:8081
      - BOOKING_SERVICE_URL=http://booking-service:8082
      - FLIGHT_SERVICE_URL=http://flight-service:8083
      - TRAIN_SERVICE_URL=http://train-service:8084
      - PROFILE_SERVICE_URL=http://profile-service:8085
      - PRICING_SERVICE_URL=http://pricing-service:8086
      - NOTIFICATION_SERVICE_URL=http://notification-service:8087
      - ADMIN_SERVICE_URL=http://admin-service:8088
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - authentication-service
      - booking-service
      - flight-service
      - train-service
      - profile-service
      - pricing-service
      - notification-service
      - admin-service
    networks:
      - ticketing-network
    restart: unless-stopped

  # Authentication Service (Go)
  authentication-service:
    build:
      context: ./backend/authentication-service
      dockerfile: Dockerfile
    container_name: ticketing-auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - ticketing-network
    restart: unless-stopped

  # Booking Service (Go)
  booking-service:
    build:
      context: ./backend/booking-service
      dockerfile: Dockerfile
    container_name: ticketing-booking-service
    ports:
      - "8082:8082"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - ticketing-network
    restart: unless-stopped

  # Flight Service (Spring Boot)
  flight-service:
    build:
      context: ./backend/catalog-service/flight-service
      dockerfile: Dockerfile
    container_name: ticketing-flight-service
    ports:
      - "8083:8083"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - FLIGHT_SERVICE_PORT=8083
    networks:
      - ticketing-network
    restart: unless-stopped

  # Train Service (Spring Boot)
  train-service:
    build:
      context: ./backend/catalog-service/train-service
      dockerfile: Dockerfile
    container_name: ticketing-train-service
    ports:
      - "8084:8084"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - TRAIN_SERVICE_PORT=8084
    networks:
      - ticketing-network
    restart: unless-stopped

  # Profile Service (Spring Boot)
  profile-service:
    build:
      context: ./backend/profile-service
      dockerfile: Dockerfile
    container_name: ticketing-profile-service
    ports:
      - "8085:8085"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - PROFILE_SERVICE_PORT=8085
    networks:
      - ticketing-network
    restart: unless-stopped

  # Pricing Service (Spring Boot)
  pricing-service:
    build:
      context: ./backend/pricing-service
      dockerfile: Dockerfile
    container_name: ticketing-pricing-service
    ports:
      - "8086:8086"
    environment:
      - PRICING_SERVICE_PORT=8086
    networks:
      - ticketing-network
    restart: unless-stopped

  # Notification Service (Spring Boot)
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: ticketing-notification-service
    ports:
      - "8087:8087"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - NOTIFICATION_SERVICE_PORT=8087
    networks:
      - ticketing-network
    restart: unless-stopped

  # Admin Service (Spring Boot)
  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile
    container_name: ticketing-admin-service
    ports:
      - "8088:8088"
    environment:
      - DB_SERVER=${DB_SERVER}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - ADMIN_SERVICE_PORT=8088
    networks:
      - ticketing-network
    restart: unless-stopped

networks:
  ticketing-network:
    driver: bridge
