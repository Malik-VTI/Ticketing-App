apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: ticketing-app
  labels:
    app: admin-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: malikvti/admin-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8088
          name: http
        env:
        - name: ADMIN_SERVICE_PORT
          value: "8088"
        envFrom:
        - secretRef:
            name: ticketing-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /admin/health
            port: 8088
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /admin/health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: ticketing-app
  labels:
    app: admin-service
spec:
  type: ClusterIP
  ports:
  - port: 8088
    targetPort: 8088
    protocol: TCP
    name: http
  selector:
    app: admin-service
