apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-service
  namespace: ticketing-app
  labels:
    app: authentication-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: authentication-service
  template:
    metadata:
      labels:
        app: authentication-service
    spec:
      containers:
      - name: authentication-service
        image: malikvti/authentication-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: DB_SERVER
          valueFrom:
            secretKeyRef:
              name: ticketing-secrets
              key: DB_SERVER
        - name: DB_DATABASE
          valueFrom:
            secretKeyRef:
              name: ticketing-secrets
              key: DB_DATABASE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: ticketing-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ticketing-secrets
              key: DB_PASSWORD
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: ticketing-secrets
              key: DB_PORT
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ticketing-secrets
              key: JWT_SECRET_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: authentication-service
  namespace: ticketing-app
  labels:
    app: authentication-service
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: authentication-service
