# TEMPLATE — AMAN DI-COMMIT (berisi placeholder, BUKAN nilai asli)
# =============================================================================
# File ini hanya mendokumentasikan key apa saja yang dibutuhkan cluster.
# JANGAN isi nilai asli di sini.
#
# Alur produksi memakai Sealed Secrets — lihat deployments/sealed-secrets/README.md
#   1. Salin file ini menjadi `01-secrets.yaml` (di-gitignore, JANGAN di-commit)
#   2. Isi nilai asli yang sudah dirotasi
#   3. Seal: `bash deployments/sealed-secrets/seal.sh`  -> 01-sealed-secrets.yaml
#   4. Commit `01-sealed-secrets.yaml` (terenkripsi, aman), bukan plaintext-nya
#
# Secret hasil unseal bernama `ticketing-secrets` di namespace `ticketing-app`.
# Semua service membacanya via `envFrom.secretRef: ticketing-secrets`.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secrets
  namespace: ticketing-app
type: Opaque
stringData:
  DB_SERVER: "REPLACE_ME_DB_HOST"
  DB_DATABASE: "REPLACE_ME_DB_NAME"
  DB_USER: "REPLACE_ME_DB_USER"
  DB_PASSWORD: "REPLACE_ME_STRONG_PASSWORD"      # rotate! min 16 char acak
  DB_PORT: "5432"
  JWT_SECRET_KEY: "REPLACE_ME_BASE64_32_BYTES"   # rotate! `openssl rand -base64 32`
  # Shared key untuk auth antar-service (booking memvalidasi, payment mengirim)
  INTERNAL_API_KEY: "REPLACE_ME_BASE64_32_BYTES" # rotate! `openssl rand -base64 32`
