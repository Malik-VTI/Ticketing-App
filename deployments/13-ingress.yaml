apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-ingress
  namespace: ticketing-app
spec:
  # DEVOPS-07: modern first-class ingressClassName (replaces the deprecated
  # kubernetes.io/ingress.class annotation).
  ingressClassName: nginx
  # TLS intentionally NOT managed by cert-manager (per decision). To enable HTTPS
  # later WITHOUT cert-manager: create your own TLS secret
  #   kubectl create secret tls ticketing-tls --cert=tls.crt --key=tls.key -n ticketing-app
  # then add:
  #   tls:
  #   - hosts: [ticketing-app.local]
  #     secretName: ticketing-tls
  rules:
  - host: ticketing-app.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
