apiVersion: apps/v1
kind: Deployment
metadata:
  name: train-service
  namespace: ticketing-app
  labels:
    app: train-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: train-service
  template:
    metadata:
      labels:
        app: train-service
    spec:
      containers:
      - name: train-service
        image: malikvti/train-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8084
          name: http
        env:
        - name: TRAIN_SERVICE_PORT
          value: "8084"
        envFrom:
        - secretRef:
            name: ticketing-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /trains/health
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /trains/health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: train-service
  namespace: ticketing-app
  labels:
    app: train-service
spec:
  type: ClusterIP
  ports:
  - port: 8084
    targetPort: 8084
    protocol: TCP
    name: http
  selector:
    app: train-service
