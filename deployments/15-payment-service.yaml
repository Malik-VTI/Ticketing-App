apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ticketing-app
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: malikvti/payment-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8089
          name: http
        env:
        - name: PAYMENT_SERVICE_PORT
          value: "8089"
        envFrom:
        - configMapRef:
            name: service-urls
        - secretRef:
            name: ticketing-secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ticketing-app
  labels:
    app: payment-service
spec:
  type: ClusterIP
  ports:
  - port: 8089
    targetPort: 8089
    protocol: TCP
    name: http
  selector:
    app: payment-service
