apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ticketing-app
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: malikvti/notification-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8087
          name: http
        env:
        - name: NOTIFICATION_SERVICE_PORT
          value: "8087"
        envFrom:
        - secretRef:
            name: ticketing-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /notifications/health
            port: 8087
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /notifications/health
            port: 8087
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ticketing-app
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
  - port: 8087
    targetPort: 8087
    protocol: TCP
    name: http
  selector:
    app: notification-service
